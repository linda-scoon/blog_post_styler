name: Sync — fetch, style & publish

# ONE button that runs the whole pipeline end to end:
#   fetch (with real cover images) -> style -> publish to WordPress
# Safe by default: it is a DRY RUN (no publishing) unless you set commit = true.
on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Publish to the live site? false = dry run (fetch + style only, nothing written to the site)"
        type: boolean
        default: false
      only:
        description: "Single post id (e.g. 4458 for Mbayani). Blank = all market posts."
        required: false
  # To make this fully automatic, uncomment the schedule below (runs daily 06:00 UTC).
  # A scheduled run uses commit=false (safe: it refreshes the repo but does NOT publish).
  # schedule:
  #   - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch posts from WordPress (with cover images)
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python3 scripts/fetch_posts.py

      - name: Style all market posts
        run: python3 scripts/style_post.py --all

      - name: Publish (dry run unless commit = true)
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          DRY_RUN: ${{ inputs.commit == true && 'false' || 'true' }}
        run: |
          python3 scripts/publish_posts.py --mode update \
            ${{ inputs.only != '' && format('--only {0}', inputs.only) || '' }}

      - name: Commit refreshed content + backups
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Sync content from WordPress [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
