name: Sync — fetch, style & publish

# ONE button that runs the whole pipeline end to end:
#   fetch (with real cover images) -> style -> publish all market posts
# Safe by default: it is a DRY RUN (nothing written to the site) unless you
# tick "commit".
on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Publish to the live site? Leave unticked for a safe dry run."
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch posts from WordPress (with cover images)
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python3 scripts/fetch_posts.py

      - name: Style all market posts
        run: python3 scripts/style_post.py --all

      - name: Publish all market posts (dry run unless commit = true)
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          DRY_RUN: ${{ inputs.commit == true && 'false' || 'true' }}
        run: python3 scripts/publish_posts.py --mode update

      - name: Commit refreshed content + backups
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Sync content from WordPress [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
