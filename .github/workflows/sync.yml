name: Sync — style & publish

# ONE button that styles the (preserved) original posts and publishes them.
# It deliberately does NOT re-fetch from WordPress: re-fetching would pull our
# own published output back and overwrite the writer's source (a feedback loop).
# To add NEW posts, run the separate "Fetch blog posts from WordPress" workflow,
# which only adds posts it doesn't already have.
# Safe by default: a DRY RUN (nothing written to the site) unless you tick "commit".
on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Publish to the live site? Leave unticked for a safe dry run."
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Style all market posts (from the preserved originals)
        run: python3 scripts/style_post.py --all

      - name: Publish all market posts (dry run unless commit = true)
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          DRY_RUN: ${{ inputs.commit == true && 'false' || 'true' }}
        run: python3 scripts/publish_posts.py --mode update

      - name: Commit styled output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/styled/ content/backup/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Styled output [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
